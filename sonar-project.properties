# SonarQube Configuration for LatestTube Project

# Project identification
sonar.projectKey=latesttube
sonar.projectName=LatestTube
sonar.projectVersion=1.0.0

# Source code location
sonar.sources=.
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.min.js,**/*.test.js,**/*.spec.js

# Language
sonar.language=js

# Encoding
sonar.sourceEncoding=UTF-8

# Test files
sonar.tests=.
sonar.test.inclusions=**/*.test.js,**/*.spec.js

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Quality Gate
sonar.qualitygate.wait=true

# Additional settings
sonar.javascript.node.maxspace=4096